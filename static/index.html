        /* Data Table View */

<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, createContext, useContext } = React;

        // ============= DATA CONTEXT =============
        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [data, setData] = useState({
                dashboard: {
                    totalProducts: 0,
                    totalReviews: 0,
                    iherbMappedPercent: 0,
                    priceAdvantagePercent: 0,
                    brandsChart: [],
                    categoryBreakdown: [],
                    recentActivity: []
                },
                products: [],
                mapping: [],
                jobs: []
            });

            return (
                <AppContext.Provider value={{ data, setData }}>
                    {children}
                </AppContext.Provider>
            );
        };

        const useApp = () => useContext(AppContext);

        // ============= API HELPER =============
        const API_BASE = '';
        const GOOGLE_CLIENT_ID = '301424841541-qrji29v6k3s7bsdqaqtql6c5fjlbhpqg.apps.googleusercontent.com';

        const apiFetch = async (url, options = {}) => {
            try {
                const res = await fetch(API_BASE + url, options);

                                {icon:'\uD83C\uDDF0\uD83C\uDDF7',name:'식약처 MFDS',type:'Regulatory Data',tag:'green',tagText:'운영중',pct:100,color:'#00A651',note:'sample key \u00B7 정식키 발급 필요'},
                                {icon:'\uD83D\uDCB3',name:'PortOne (KR PG)',type:'Payment',tag:'yellow',tagText:'미연동',pct:0,color:'#cbd5e1',note:'W2 계약 목표'},
                                {icon:'\uD83D\uDE9A',name:'배송사 (CJ/EMS)',type:'Shipping',tag:'yellow',tagText:'미연동',pct:0,color:'#cbd5e1',note:'W2 확정 목표'}

                                    React.createElement('td', null, React.createElement('span', {className:'ops-tag '+r.tag}, r.tagText)),
                                    React.createElement('td', null,
                                        React.createElement('div', {className:'ops-stock-bar'},
                                            React.createElement('div', {className:'ops-stock-fill', style:{width:r.pct+'%',background:r.color}})

                                    React.createElement('td', null, r.note)

        };

        // ============= PRODUCTS PAGE (OPLE) =============
        const ProductsPage = () => {
            const [products, setProducts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => {
                const load = async () => {
                    const res = await apiFetch('/api/products');
                    if (res) setProducts(Array.isArray(res) ? res : []);
                    setLoading(false);
                };
                load();
            }, []);

            const filtered = products.filter(p =>
                !searchTerm || (p.name_ko || p.name_en || '').toLowerCase().includes(searchTerm.toLowerCase())
            );

            if (loading) return <div className="flex justify-center py-20"><div className="spinner"></div></div>;

            return (
                <div className="space-y-6">
                    <div className="filter-section">
                        <input type="text" placeholder="제품명으로 검색..." value={searchTerm}
                            onChange={e => setSearchTerm(e.target.value)} className="search-input flex-1" />
                        <span className="text-sm text-gray-500">{filtered.length}개 제품</span>
                    </div>

                    {filtered.length === 0 ? (
                        <div className="card p-8 text-center">
                            <p className="text-gray-500">OPLE 제품 데이터가 없습니다</p>
                        </div>
                    ) : (
                        <div className="card overflow-hidden">
                            <table className="w-full">
                                <thead className="bg-gray-50 border-b border-gray-200">
                                    <tr>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">제품명</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">브랜드</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">가격</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">리뷰</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filtered.slice(0, 50).map((p, idx) => (
                                        <tr key={idx} className="table-row border-b border-gray-100">
                                            <td className="px-6 py-4 font-medium text-gray-900">{p.name_ko || p.name_en}</td>
                                            <td className="px-6 py-4 text-gray-700">{p.brand}</td>
                                            <td className="px-6 py-4 font-bold text-gray-900">
                                                {p.price_krw ? `₩${p.price_krw.toLocaleString()}` : p.price_usd ? `$${p.price_usd}` : '-'}
                                            </td>
                                            <td className="px-6 py-4 text-gray-700">{p.review_count || 0}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>

        };

        // ============= iHERB PRODUCTS PAGE =============
        const IHerbProductsPage = () => {
            const [products, setProducts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedBrand, setSelectedBrand] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('');
            const [sortBy, setSortBy] = useState('rating');
            const [page, setPage] = useState(1);
            const [total, setTotal] = useState(0);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [detailData, setDetailData] = useState(null);
            const [brands, setBrands] = useState([]);
            const [categories, setCategories] = useState([]);
            const [viewMode, setViewMode] = useState('table');
            const limit = viewMode === 'table' ? 50 : 24;

            const loadProducts = useCallback(async () => {
                setLoading(true);
                const params = new URLSearchParams({
                    skip: ((page - 1) * limit).toString(),
                    limit: limit.toString(),
                    sort: sortBy
                });
                if (searchTerm) params.set('search', searchTerm);
                if (selectedBrand) params.set('brand', selectedBrand);
                if (selectedCategory) params.set('category', selectedCategory);

                const res = await apiFetch(`/api/iherb/products?${params}`);
                if (res) {
                    setProducts(res.products || []);
                    setTotal(res.total || 0);
                }
                setLoading(false);
            }, [page, searchTerm, selectedBrand, selectedCategory, sortBy, viewMode]);

            useEffect(() => {
                loadProducts();
            }, [loadProducts]);

            useEffect(() => {
                const loadFilters = async () => {
                    const stats = await apiFetch('/api/iherb/stats');
                    if (stats) {
                        setBrands((stats.by_brand || []).map(b => b.brand).filter(Boolean));
                        setCategories((stats.by_category || []).map(c => c.category).filter(Boolean));
                    }
                };
                loadFilters();
            }, []);

            const totalPages = Math.ceil(total / limit);

            const openDetail = async (product) => {
                setSelectedProduct(product);
                const detail = await apiFetch(`/api/iherb/products/${product.iherb_id}`);
                setDetailData(detail);
            };

            const closeDetail = () => {
                setSelectedProduct(null);
                setDetailData(null);
            };

                <div className="space-y-6">
                    {/* Filters */}
                    <div className="filter-section">
                        <input type="text" placeholder="상품명 검색..." value={searchTerm}
                            onChange={e => { setSearchTerm(e.target.value); setPage(1); }}
                            className="search-input flex-1" style={{ minWidth: '200px' }}
                        />
                        <select value={selectedBrand} onChange={e => { setSelectedBrand(e.target.value); setPage(1); }} className="filter-select">
                            <option value="">모든 브랜드</option>
                            {brands.slice(0, 50).map(b => <option key={b} value={b}>{b}</option>)}
                        </select>
                        <select value={selectedCategory} onChange={e => { setSelectedCategory(e.target.value); setPage(1); }} className="filter-select">
                            <option value="">모든 카테고리</option>
                            {categories.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                        <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="filter-select">
                            <option value="rating">평점순</option>
                            <option value="reviews">리뷰순</option>
                            <option value="price_asc">가격 낮은순</option>
                            <option value="price_desc">가격 높은순</option>
                            <option value="newest">최신순</option>
                        </select>

                            <button className={viewMode === 'table' ? 'active' : ''} onClick={() => { setViewMode('table'); setPage(1); }} title="테이블 뷰">☰</button>
                            <button className={viewMode === 'grid' ? 'active' : ''} onClick={() => { setViewMode('grid'); setPage(1); }} title="카드 뷰">▦</button>
                        </div>
                        <span className="text-sm text-gray-500 whitespace-nowrap">{total.toLocaleString()}개 상품</span>
                    </div>

                    {loading ? (
                        <div className="flex justify-center py-20"><div className="spinner"></div></div>
                    ) : products.length === 0 ? (
                        <div className="card p-8 text-center">
                            <p className="text-gray-500 text-lg mb-2">iHerb 상품 데이터가 없습니다</p>
                            <p className="text-gray-400 text-sm">스크래퍼 탭에서 iHerb 스크래핑을 시작하세요</p>
                        </div>
                    ) : (
                        <div>
                            {viewMode === 'table' ? (
                            /* ===== DATA TABLE VIEW ===== */

                                        <tr>
                                            <th style={{width:'30px',textAlign:'center'}}>#</th>
                                            <th className="thumb-cell"></th>
                                            <th className="name-cell" onClick={() => setSortBy('name')}>
                                                상품명 <span className={'sort-icon' + (sortBy==='name'?' sorted':'')}>↕</span>
                                            </th>
                                            <th onClick={() => setSortBy('category')}>
                                                카테고리 <span className={'sort-icon'}>↕</span>
                                            </th>
                                            <th className="num-cell" onClick={() => setSortBy(sortBy==='price_desc'?'price_asc':'price_desc')}>
                                                원화가격 <span className={'sort-icon' + (sortBy.startsWith('price')?' sorted':'')}>↕</span>
                                            </th>
                                            <th className="num-cell" onClick={() => setSortBy('rating')}>
                                                평점 <span className={'sort-icon' + (sortBy==='rating'?' sorted':'')}>↕</span>
                                            </th>
                                            <th className="num-cell" onClick={() => setSortBy('reviews')}>
                                                리뷰수 <span className={'sort-icon' + (sortBy==='reviews'?' sorted':'')}>↕</span>
                                            </th>
                                            <th className="num-cell">Q&A</th>
                                            <th style={{textAlign:'center'}}>재고</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {products.map((p, idx) => (
                                            <tr key={p.iherb_id || idx} onClick={() => openDetail(p)}>
                                                <td style={{textAlign:'center',color:'#94a3b8',fontSize:'0.7rem'}}>{(page - 1) * limit + idx + 1}</td>
                                                <td className="thumb-cell">
                                                    <img

                                                        alt="" loading="lazy"
                                                        onError={e => { e.target.style.display = 'none'; }}
                                                    />
                                                </td>
                                                <td className="name-cell">
                                                    <div className="prod-name">{p.name_ko || p.name}</div>
                                                    <div className="prod-brand">{p.brand}</div>
                                                </td>
                                                <td><span className="category-tag">{p.category || '-'}</span></td>
                                                <td className="num-cell price-cell">
                                                    {p.price_krw > 0 ? String.fromCharCode(8361) + Math.round(p.price_krw).toLocaleString() : (p.price_usd > 0 ? ('$' + p.price_usd.toFixed(2)) : '-')}
                                                </td>
                                                <td className="num-cell">
                                                    <div className="rating-bar">
                                                        <span style={{fontWeight:600,color:'#1e293b'}}>{(p.rating || 0).toFixed(1)}</span>
                                                        <div className="bar"><div className="bar-fill" style={{width: ((p.rating || 0) / 5 * 100) + '%'}}></div></div>
                                                    </div>
                                                </td>
                                                <td className="num-cell" style={{fontWeight:500}}>
                                                    {p.review_count ? p.review_count.toLocaleString() : '-'}
                                                </td>
                                                <td className="num-cell" style={{color:'#64748b'}}>
                                                    {p.qa_count || '-'}
                                                </td>
                                                <td style={{textAlign:'center'}}>
                                                    {p.in_stock !== false ?
                                                        <span style={{color:'#059669',fontSize:'0.75rem',fontWeight:600}}>●</span> :
                                                        <span style={{color:'#ef4444',fontSize:'0.75rem',fontWeight:600}}>●</span>
                                                    }
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            ) : (
                            /* ===== CARD GRID VIEW ===== */
                            <div className="product-grid">
                                {products.map((p, idx) => (
                                    <div key={p.iherb_id || idx} className="product-card" onClick={() => openDetail(p)}>
                                        <img
                                            src={p.image_url || p.thumbnail_url || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect fill="%23f3f4f6" width="200" height="200"/><text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="%239ca3af" font-size="14">No Image</text></svg>'}
                                            alt={p.name || 'Product'}
                                            loading="lazy"
                                            onError={e => { e.target.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect fill="%23f3f4f6" width="200" height="200"/><text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="%239ca3af" font-size="14">No Image</text></svg>'; }}
                                        />
                                        <div className="p-4">
                                            <p className="text-xs text-gray-400 mb-1">{p.brand}</p>
                                            <h4 className="font-medium text-gray-900 text-sm mb-2 line-clamp-2" style={{ display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>
                                                {p.name_ko || p.name}
                                            </h4>
                                            <StarRating rating={p.rating || 0} count={p.review_count} />
                                            <div className="mt-2 flex items-center gap-2">
                                                <span className="text-lg font-bold text-green-600">
                                                    {p.price_krw > 0 ? (String.fromCharCode(8361) + Math.round(p.price_krw).toLocaleString()) : ('$' + (p.price_usd ? p.price_usd.toFixed(2) : '0.00'))}
                                                </span>
                                                {p.discount_pct > 0 && (
                                                    <span className="badge badge-danger text-xs">-{p.discount_pct}%</span>
                                                )}
                                            </div>
                                            {p.in_stock === false && (
                                                <span className="badge badge-danger mt-2">품절</span>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            )}

                            {/* Pagination */}
                            {totalPages > 1 && (
                                <div className="pagination mt-6">
                                    <button onClick={() => setPage(1)} disabled={page === 1}>처음</button>
                                    <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page === 1}>이전</button>
                                    <span className="flex items-center px-3 text-sm text-gray-600">
                                        {page} / {totalPages}

                                    <button onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={page === totalPages}>다음</button>
                                    <button onClick={() => setPage(totalPages)} disabled={page === totalPages}>마지막</button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* Product Detail Modal */}
                    {selectedProduct && (
                        <div className="modal" onClick={closeDetail}>
                            <div className="modal-content" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-start mb-4">

                                        <p className="text-xs text-gray-400 mb-1">{detailData?.basic?.brand_ko || selectedProduct.brand}</p>
                                        <h2 className="text-xl font-bold text-gray-900">{detailData?.basic?.name_ko || selectedProduct.name_ko || selectedProduct.name}</h2>
                                        {detailData?.basic?.name_ko && detailData?.basic?.name && detailData.basic.name_ko !== detailData.basic.name && (
                                            <p className="text-xs text-gray-400 mt-1">{detailData.basic.name}</p>
                                        )}
                                    </div>
                                    <button onClick={closeDetail} className="text-gray-400 hover:text-gray-600 text-2xl ml-4">✕</button>
                                </div>

                                {!detailData ? (
                                    <div className="flex justify-center py-10"><div className="spinner"></div></div>
                                ) : (
                                    <div className="space-y-6">
                                        {/* Image + Basic Info */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div>
                                                <img
                                                    src={detailData.basic?.image_url || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300"><rect fill="%23f3f4f6" width="300" height="300"/><text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="%239ca3af" font-size="16">No Image</text></svg>'}
                                                    alt={detailData.basic?.name}
                                                    className="w-full rounded-lg"
                                                    style={{ maxHeight: '300px', objectFit: 'contain', background: '#f9fafb' }}
                                                />
                                            </div>
                                            <div className="space-y-3">
                                                {/* Pricing */}
                                                <div>
                                                    <p className="text-sm text-gray-500">가격</p>
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-2xl font-bold text-green-600">${detailData.pricing?.price_usd?.toFixed(2) || '0'}</span>
                                                        {detailData.pricing?.price_krw > 0 && (
                                                            <span className="text-lg font-semibold text-gray-600">₩{detailData.pricing.price_krw.toLocaleString()}</span>
                                                        )}
                                                        {detailData.pricing?.price_original > 0 && detailData.pricing?.price_original > detailData.pricing?.price_usd && (
                                                            <span className="text-gray-400 line-through">${detailData.pricing?.price_original?.toFixed(2)}</span>
                                                        )}
                                                        {detailData.pricing?.discount_pct > 0 && (
                                                            <span className="badge badge-danger">-{detailData.pricing?.discount_pct}%</span>
                                                        )}
                                                    </div>
                                                </div>
                                                {/* Rating */}
                                                <div>
                                                    <p className="text-sm text-gray-500">평점</p>
                                                    <StarRating rating={detailData.rating?.rating || 0} count={detailData.rating?.count} />
                                                </div>
                                                {/* Stock */}
                                                <div>
                                                    <p className="text-sm text-gray-500">재고</p>
                                                    <span className={`badge ${detailData.pricing?.in_stock !== false ? 'badge-success' : 'badge-danger'}`}>
                                                        {detailData.pricing?.stock_status || (detailData.pricing?.in_stock !== false ? 'In Stock' : 'Out of Stock')}
                                                    </span>
                                                </div>
                                                {/* Badges */}
                                                {detailData.certifications?.badges?.length > 0 && (
                                                    <div>
                                                        <p className="text-sm text-gray-500 mb-1">배지</p>
                                                        <div className="flex flex-wrap gap-1">
                                                            {detailData.certifications.badges.map((b, i) => (
                                                                <span key={i} className="tag">{b}</span>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}

                                                {detailData.basic?.url && (
                                                    <a href={detailData.basic.url} target="_blank" rel="noopener noreferrer"
                                                        className="inline-block mt-2 text-sm text-blue-600 hover:underline">
                                                        iHerb에서 보기 →
                                                    </a>
                                                )}
                                            </div>

                                        {(detailData.description?.description_ko || detailData.description?.description) && (
                                            <div>
                                                <h4 className="font-bold text-gray-900 mb-2">상품 설명 {detailData.description?.description_ko && <span className="text-xs font-normal text-blue-500 ml-1">🇰🇷</span>}</h4>

                                                        <p className="text-xs text-gray-500 mt-1 whitespace-pre-line">{detailData.description.description.slice(0, 300)}</p>
                                                    </details>
                                                )}
                                            </div>
                                        )}

                                            <div>
                                                <h4 className="font-bold text-gray-900 mb-2">복용법 {detailData.description?.suggested_use_ko && <span className="text-xs font-normal text-blue-500 ml-1">🇰🇷</span>}</h4>
                                                <p className="text-sm text-gray-700">{detailData.description.suggested_use_ko || detailData.description.suggested_use}</p>
                                            </div>
                                        )}

                                        {/* Warnings (Korean preferred) */}
                                        {(detailData.description?.warnings_ko || detailData.description?.warnings) && (
                                            <div>
                                                <h4 className="font-bold text-red-600 mb-2">⚠ 주의사항 {detailData.description?.warnings_ko && <span className="text-xs font-normal text-blue-500 ml-1">🇰🇷</span>}</h4>
                                                <p className="text-sm text-gray-700 bg-red-50 rounded-lg p-3 border border-red-100">{detailData.description.warnings_ko || detailData.description.warnings}</p>

                const body = {
                    max_products: maxProducts
                };
                if (selectedCategories !== 'all') {
                    body.categories = [selectedCategories];
                }

                try {
                    const res = await fetch('/api/jobs/scrape-iherb', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    const data = await res.json();
                    if (data.job_id) {
                        setScrapeStatus(`작업 시작됨 (ID: ${data.job_id}). 백그라운드에서 실행 중...`);
                        // Poll job status
                        const pollInterval = setInterval(async () => {
                            const jobRes = await apiFetch(`/api/jobs/${data.job_id}`);

                                setScrapeStatus(`상태: ${jobRes.status} | 처리: ${jobRes.processed_items || 0}/${jobRes.total_items || '?'}`);

`{% comment %} iHerb 스타일 상품 카드 {% endcomment %}
<div class="ople-product-card" data-product-id="{{ product.id }}">

  {%- comment -%} 1. 배지 영역 {%- endcomment -%}
  <div class="card-badges">
    {% if product.metafields.custom.badge %}
      <span class="badge badge--{{ product.metafields.custom.badge_type }}">
        {{ product.metafields.custom.badge }}
      </span>
    {% endif %}
    {% if product.metafields.custom.is_bestseller %}
      <span class="badge badge--bestseller">베스트셀러</span>
    {% endif %}
  </div>

  {%- comment -%} 2. 이미지 + Quick Add {%- endcomment -%}
  <div class="card-media">
    <a href="{{ product.url }}">
      <img src="{{ product.featured_image | image_url: width: 400 }}"
           alt="{{ product.title }}" loading="lazy" />
    </a>
    <button class="quick-add-btn"
            data-variant-id="{{ product.selected_or_first_available_variant.id }}">
      장바구니에 추가
    </button>
  </div>

  {%- comment -%} 3. 상품 정보 {%- endcomment -%}
  <div class="card-info">
    <a href="{{ product.url }}" class="card-title">{{ product.title }}</a>

    {%- comment -%} 별점 + 리뷰 수 (Judge.me metafield) {%- endcomment -%}
    {% if product.metafields.reviews.rating.value %}
      <div class="card-rating">
        {% render 'star-rating',
           rating: product.metafields.reviews.rating.value %}
        <span class="review-count">
          {{ product.metafields.reviews.rating_count }}
        </span>
      </div>
    {% endif %}

    {%- comment -%} 판매량 표시 (커스텀 metafield) {%- endcomment -%}
    {% if product.metafields.custom.sales_30d %}
      <div class="sales-volume">
        📈 30일 동안 {{ product.metafields.custom.sales_30d }}개 판매
      </div>
    {% endif %}

    {%- comment -%} 프로모 태그 {%- endcomment -%}
    {% if product.metafields.custom.promo_tag %}
      <span class="promo-tag">
        🏷️ {{ product.metafields.custom.promo_tag }}
      </span>
    {% endif %}

    {%- comment -%} 가격 영역 {%- endcomment -%}
    <div class="card-price">
      {% if product.compare_at_price > product.price %}
        <span class="price--sale">{{ product.price | money }}</span>
        <span class="price--original">
          {{ product.compare_at_price | money }}
        </span>
        <span class="price--discount">
          -{{ product.compare_at_price | minus: product.price
             | times: 100 | divided_by: product.compare_at_price }}%
        </span>
      {% else %}
        <span class="price--regular">{{ product.price | money }}</span>
      {% endif %}
    </div>
  </div>
</div>`}),

{%- assign health_concerns = "면역강화,소화건강,피부건강,관절건강,수면개선,에너지,심장건강,뇌건강,눈건강,뼈건강,간건강,체중관리,스트레스,여성건강,남성건강,어린이건강,혈당관리,항산화,모발건강,구강건강,호흡기건강,전립선건강,근육운동,갱년기" | split: "," -%}

  <h2 class="health-topics-title">건강 주제</h2>
  <div class="health-topics-grid">
    {%- for concern in health_concerns -%}
      <a href="/collections/all/concern:{{ concern }}"
         class="health-topic-card">
        <span class="health-topic-icon">
          {%- case concern -%}
            {%- when '면역강화' -%}🛡️
            {%- when '소화건강' -%}🦠
            {%- when '피부건강' -%}✨
            {%- when '관절건강' -%}🦴
            {%- when '수면개선' -%}😴
            {%- when '에너지' -%}⚡
            {%- else -%}💊
          {%- endcase -%}
        </span>
        <span class="health-topic-label">{{ concern }}</span>
      </a>
    {%- endfor -%}
  </div>
</div>`}),

{%- assign current_tags = collection.current_tags -%}

<div class="concern-filter-sidebar">
  <h3 class="filter-title">건강 주제별 보기</h3>
  {%- for product in collection.products -%}
    {%- for tag in product.tags -%}
      {%- if tag contains 'concern:' -%}
        {%- assign concern_name = tag | remove: 'concern:' -%}
        {%- unless concern_list contains concern_name -%}
          {%- assign concern_list = concern_list
              | append: concern_name | append: ',' -%}
        {%- endunless -%}
      {%- endif -%}
    {%- endfor -%}
  {%- endfor -%}

  {%- assign unique_concerns = concern_list | split: ',' -%}
  <ul class="filter-list">
    {%- for concern in unique_concerns -%}
      {%- if concern != blank -%}
        <li>
          <a href="{{ collection.url }}/concern:{{ concern }}"
             class="{% if current_tags contains concern %}active{% endif %}">
            {{ concern }}
          </a>
        </li>
      {%- endif -%}
    {%- endfor -%}
  </ul>
</div>

      {%- endif -%}

  {%- endfor -%}

                                {/* List */}
                                {members.map(m => (
                                    <div key={m.id} style={{display:'flex',alignItems:'center',gap:'10px',padding:'8px 0',borderBottom:'1px solid #f1f5f9'}}>
                                        <Avatar mId={m.id} size={32} />
                                        <div style={{flex:1}}>
                                            <div style={{fontWeight:600,fontSize:'0.88rem'}}>{m.name}</div>
                                            <div style={{fontSize:'0.72rem',color:'#94a3b8'}}>{m.role}</div>
                                        </div>
                                        {m.id !== 'm1' && <button onClick={()=>removeMember(m.id)} style={{background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:'0.78rem',fontWeight:600}}>삭제</button>}
                                    </div>
                                ))}

                                {/* Add */}
                                <div style={{marginTop:'16px',padding:'14px',background:'#f8fafc',borderRadius:'8px'}}>
                                    <div style={{fontSize:'0.82rem',fontWeight:600,marginBottom:'10px',color:'#475569'}}>새 담당자 추가</div>
                                    <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
                                        <input value={newMember.name} onChange={e=>setNewMember({...newMember,name:e.target.value})} placeholder="이름" style={{flex:1,padding:'7px 10px',borderRadius:'6px',border:'1px solid #e2e8f0',fontSize:'0.82rem',minWidth:'80px'}} />
                                        <input value={newMember.initials} onChange={e=>setNewMember({...newMember,initials:e.target.value})} placeholder="이니셜(2자)" maxLength={3} style={{width:'70px',padding:'7px 10px',borderRadius:'6px',border:'1px solid #e2e8f0',fontSize:'0.82rem'}} />
                                        <select value={newMember.role} onChange={e=>setNewMember({...newMember,role:e.target.value})} style={{padding:'7px 10px',borderRadius:'6px',border:'1px solid #e2e8f0',fontSize:'0.82rem'}}>
                                            <option value="담당자">담당자</option>
                                            <option value="개발">개발</option>
                                            <option value="디자인">디자인</option>
                                            <option value="PM">PM</option>
                                            <option value="관리자">관리자</option>
                                        </select>
                                        <button onClick={addMember} style={{padding:'7px 16px',borderRadius:'6px',border:'none',background:'#3b82f6',color:'#fff',fontSize:'0.82rem',fontWeight:600,cursor:'pointer'}}>추가</button>
                                    </div>
                                </div>

                                <button onClick={()=>setShowMemberModal(false)} style={{marginTop:'16px',width:'100%',padding:'10px',borderRadius:'8px',border:'none',background:'#1e293b',color:'#fff',fontSize:'0.88rem',fontWeight:600,cursor:'pointer'}}>닫기</button>
                            </div>
                        </div>
                    )}

                    {/* ═══ SPREADSHEET VIEW ═══ */}
                    {viewMode === 'spreadsheet' && projects.map(project => {
                        const pp = getProjectProgress(project);
                        const autoStatus = pp.pct === 100 ? 'completed' : pp.pct > 0 ? 'in_progress' : 'pending';
                        const asc = statusColors[autoStatus];

                        return (
                            <div key={project.id} style={{background:'#fff',borderRadius:'12px',border:'1px solid #e8ecf1',marginBottom:'16px',overflow:'hidden'}}>
                                <div style={{padding:'14px 20px',borderBottom:'1px solid #f1f5f9',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                                    <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                                        <span style={{padding:'3px 10px',borderRadius:'12px',fontSize:'0.7rem',fontWeight:600,background:asc.bg,color:asc.text}}>{asc.label}</span>
                                        <span style={{fontSize:'0.92rem',fontWeight:700,color:'#1e293b'}}>{project.name}</span>
                                        <span style={{fontSize:'0.72rem',color:'#94a3b8',background:'#f1f5f9',padding:'2px 8px',borderRadius:'8px'}}>{project.dueDate}</span>
                                        <span style={{fontSize:'0.72rem',color:'#94a3b8'}}>{pp.done}/{pp.total}</span>
                                    </div>
                                    <PBar pct={pp.pct} sz="lg" />
                                </div>

                                <div style={{display:'grid',gridTemplateColumns:'36px 1fr 1.3fr 90px 60px 72px 110px',padding:'7px 20px',background:'#f8fafc',borderBottom:'1px solid #f1f5f9',fontSize:'0.7rem',fontWeight:600,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.03em'}}>
                                    <div></div><div>Task</div><div>Description</div><div>Assignee</div><div>Due</div><div>Priority</div><div>Progress</div>
                                </div>

                                {project.groups.map(group => {
                                    const gp = getGroupProgress(group);
                                    const pc = priorityColors[group.priority] || priorityColors.normal;
                                    const isExp = expandedGroups[group.id] !== false;

                                    return (
                                        <div key={group.id}>
                                            <div onClick={()=>toggleGroup(group.id)} style={{display:'grid',gridTemplateColumns:'36px 1fr 1.3fr 90px 60px 72px 110px',padding:'9px 20px',background:gp.pct===100?'#f0fdf4':'#fff',borderBottom:'1px solid #f1f5f9',cursor:'pointer',alignItems:'center'}}>
                                                <div><CBox checked={gp.pct===100} onClick={e=>e.stopPropagation()} /></div>
                                                <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                                                    <svg width="10" height="10" viewBox="0 0 12 12" style={{transform:isExp?'rotate(90deg)':'rotate(0)',transition:'transform 0.2s',fill:'#94a3b8'}}><path d="M4 2l5 4-5 4V2z"/></svg>
                                                    <span style={{fontWeight:700,fontSize:'0.85rem',color:gp.pct===100?'#94a3b8':'#1e293b',textDecoration:gp.pct===100?'line-through':'none'}}>{group.name}</span>
                                                    <span style={{fontSize:'0.68rem',color:'#94a3b8',background:'#f1f5f9',padding:'1px 5px',borderRadius:'8px'}}>{group.tasks.length}</span>
                                                </div>
                                                <div></div><div></div><div></div>
                                                <div style={{position:'relative'}}>
                                                    <span onClick={(e)=>{e.stopPropagation();setPriorityDropdown(priorityDropdown&&priorityDropdown.gId===group.id?null:{pId:project.id,gId:group.id})}} style={{padding:'2px 8px',borderRadius:'10px',fontSize:'0.68rem',fontWeight:600,background:pc.bg,color:pc.text,cursor:'pointer'}}>{pc.label}</span>
                                                    {priorityDropdown && priorityDropdown.gId===group.id && (
                                                        <div style={{position:'absolute',top:'24px',left:0,background:'#fff',border:'1px solid #e2e8f0',borderRadius:'8px',boxShadow:'0 4px 12px rgba(0,0,0,0.1)',padding:'4px',zIndex:100,minWidth:'100px'}} onClick={e=>e.stopPropagation()}>
                                                            {Object.entries(priorityColors).map(([k,v]) => (
                                                                <div key={k} onClick={()=>changeGroupPriority(project.id,group.id,k)} style={{padding:'5px 10px',borderRadius:'6px',cursor:'pointer',display:'flex',alignItems:'center',gap:'6px',background:group.priority===k?v.bg:'transparent',fontSize:'0.76rem'}}>
                                                                    <span style={{width:'8px',height:'8px',borderRadius:'50%',background:v.text}}></span>
                                                                    <span style={{fontWeight:group.priority===k?600:400,color:group.priority===k?v.text:'#334155'}}>{v.label}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                                <div><PBar pct={gp.pct} sz="sm" /></div>
                                            </div>

                                            {isExp && group.tasks.map(task => (
                                                <div key={task.id} style={{display:'grid',gridTemplateColumns:'36px 1fr 1.3fr 90px 60px 72px 110px',padding:'8px 20px 8px 48px',borderBottom:'1px solid #f8fafc',alignItems:'center',background:task.done?'#fafffe':'#fff'}}>
                                                    <div><CBox checked={task.done} onClick={()=>toggleTask(project.id,group.id,task.id)} /></div>
                                                    <div style={{fontSize:'0.82rem',color:task.done?'#94a3b8':'#334155',textDecoration:task.done?'line-through':'none',fontWeight:500}}>{task.name}</div>
                                                    <div style={{fontSize:'0.76rem',color:'#94a3b8'}}>{task.desc}</div>
                                                    <div><AssigneeCell task={task} pId={project.id} gId={group.id} /></div>
                                                    <div style={{fontSize:'0.73rem',color:'#64748b',fontWeight:500}}>{task.due}</div>
                                                    <div></div>
                                                    <div>{task.done ? <span style={{fontSize:'0.73rem',color:'#16a34a',fontWeight:600}}>Done ✓</span> : <span style={{fontSize:'0.73rem',color:'#cbd5e1'}}>—</span>}</div>
                                                </div>
                                            ))}
                                        </div>
                                    );
                                })}
                            </div>
                        );
                    })}

                    {/* ═══ BOARD VIEW (Kanban) ═══ */}
                    {viewMode === 'board' && (
                        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'16px',alignItems:'start'}}>
                            {boardColumns.map(col => {
                                const tasks = getAllTasks().filter(t => getTaskStatus(t) === col.id);
                                return (
                                    <div key={col.id}
                                        onDragOver={(e)=>e.preventDefault()}
                                        onDrop={(e)=>{
                                            e.preventDefault();
                                            if (dragTask) { changeTaskStatus(dragTask.pId, dragTask.gId, dragTask.tId, col.id); setDragTask(null); }
                                        }}
                                        style={{background:col.bg,borderRadius:'12px',padding:'12px',minHeight:'400px'}}
                                    >
                                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'14px',padding:'0 4px'}}>
                                            <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                                                <div style={{width:'8px',height:'8px',borderRadius:'50%',background:col.color}}></div>
                                                <span style={{fontSize:'0.88rem',fontWeight:700,color:'#1e293b'}}>{col.label}</span>
                                                <span style={{fontSize:'0.72rem',fontWeight:600,color:'#94a3b8',background:'#fff',padding:'1px 7px',borderRadius:'10px'}}>{tasks.length}</span>
                                            </div>
                                        </div>

                                        {tasks.map(task => {
                                            const pc = priorityColors[task.groupPriority] || priorityColors.normal;
                                            return (
                                                <div key={task.id}
                                                    draggable
                                                    onDragStart={()=>setDragTask({pId:task.projectId,gId:task.groupId,tId:task.id})}
                                                    onDragEnd={()=>setDragTask(null)}
                                                    style={{background:'#fff',borderRadius:'10px',padding:'14px',marginBottom:'10px',border:'1px solid #e8ecf1',cursor:'grab',boxShadow:'0 1px 3px rgba(0,0,0,0.04)',transition:'box-shadow 0.15s,transform 0.15s'}}
                                                    onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 4px 12px rgba(0,0,0,0.08)';e.currentTarget.style.transform='translateY(-1px)';}}
                                                    onMouseLeave={e=>{e.currentTarget.style.boxShadow='0 1px 3px rgba(0,0,0,0.04)';e.currentTarget.style.transform='translateY(0)';}}
                                                >
                                                    {/* Tags */}
                                                    <div style={{display:'flex',gap:'4px',marginBottom:'8px',flexWrap:'wrap'}}>
                                                        <span style={{padding:'2px 8px',borderRadius:'10px',fontSize:'0.65rem',fontWeight:600,background:pc.bg,color:pc.text}}>{pc.label}</span>
                                                        <span style={{padding:'2px 8px',borderRadius:'10px',fontSize:'0.65rem',fontWeight:500,background:'#f1f5f9',color:'#64748b'}}>{task.groupName}</span>
                                                    </div>

                                                    {/* Title */}
                                                    <div style={{fontSize:'0.88rem',fontWeight:700,color:'#1e293b',marginBottom:'6px',lineHeight:1.3}}>{task.name}</div>

                                                    {/* Description */}
                                                    <div style={{fontSize:'0.76rem',color:'#94a3b8',marginBottom:'12px',lineHeight:1.4}}>{task.desc}</div>

                                                    {/* Footer */}
                                                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                                                        <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                                                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                                            <span style={{fontSize:'0.72rem',color:'#94a3b8',fontWeight:500}}>{task.due}</span>
                                                        </div>
                                                        <div style={{display:'flex',alignItems:'center'}}>
                                                            {(task.assignees||[]).map(mId => <Avatar key={mId} mId={mId} size={24} />)}
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}

                                        {tasks.length === 0 && (
                                            <div style={{padding:'20px',textAlign:'center',color:'#cbd5e1',fontSize:'0.78rem',border:'2px dashed #e2e8f0',borderRadius:'10px'}}>
                                                드래그하여 여기에 놓기
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        // ============= MAIN APP =============
        const Main = ({ currentUser, onLogout }) => {
            const [activeTab, setActiveTab] = useState('dashboard');

            return (
                <div style={{display:'flex',minHeight:'100vh',background:'#f0f2f5'}}>
                    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} currentUser={currentUser} onLogout={onLogout} />
                    <main style={{flex:1,padding:'28px 32px',maxWidth:'calc(100vw - 240px)'}}>
                        {activeTab !== 'dashboard' && activeTab !== 'users' && activeTab !== 'navCompare' && activeTab !== 'tagStrategy' && activeTab !== 'projectShopify' && activeTab !== 'shopifySkin' && (
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'24px'}}>
                            <h1 style={{fontSize:'1.5rem',fontWeight:800,color:'#1e293b'}}>
                                {activeTab === 'products' && 'OPLE 제품'}
                                {activeTab === 'iherb' && 'iHerb 상품'}
                                {activeTab === 'mapping' && 'iHerb 매핑'}
                                {activeTab === 'analytics' && '분석'}
                                {activeTab === 'scraper' && '스크래퍼'}
                                {activeTab === 'navCompare' && '네비게이션 비교'}
                            </h1>
                        </div>
                        )}
                        {activeTab === 'dashboard' && <Dashboard />}
                        {activeTab === 'products' && <ProductsPage />}
                        {activeTab === 'iherb' && <IHerbProductsPage />}
                        {activeTab === 'mapping' && <MappingPage />}
                        {activeTab === 'analytics' && <AnalyticsPage />}
                        {activeTab === 'scraper' && <ScraperPage />}
                        {activeTab === 'users' && <UsersPage currentUser={currentUser} />}
                        {activeTab === 'navCompare' && <NavComparePage />}
                        {activeTab === 'tagStrategy' && <TagStrategyPage />}
                        {activeTab === 'projectShopify' && <ProjectManager />}
                        {activeTab === 'shopifySkin' && <ShopifySkinPage />}
                    </main>
                </div>
            );
        };

        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [authChecking, setAuthChecking] = useState(true);

            useEffect(() => {
                checkAuth();
            }, []);

            const checkAuth = async () => {
                const token = localStorage.getItem('ople_token');
                if (token) {
                    const user = await apiAuthFetch('/api/auth/me');
                    if (user) {
                        setCurrentUser(user);
                    } else {
                        localStorage.removeItem('ople_token');
                    }
                }
                setAuthChecking(false);
            };

            const handleLoginSuccess = (user) => {
                setCurrentUser(user);
            };

            const handleLogout = () => {
                localStorage.removeItem('ople_token');
                setCurrentUser(null);
            };

            if (authChecking) {
                return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}>로딩 중...</div>;
            }

            if (!currentUser) {
                return <Login onLoginSuccess={handleLoginSuccess} />;
            }

            return (
                <AppProvider>
                    <Main currentUser={currentUser} onLogout={handleLogout} />
                </AppProvider>
            );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
