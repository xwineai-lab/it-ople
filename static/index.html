                            onChange={e => setSearchTerm(e.target.value)} className="search-input flex-1" />
                        <span className="text-sm text-gray-500">{filtered.length}개 제품</span>
                    </div>

                    {filtered.length === 0 ? (
                        <div className="card p-8 text-center">
                            <p className="text-gray-500">OPLE 제품 데이터가 없습니다</p>
                        </div>
                    ) : (
                        <div className="card overflow-hidden">
                            <table className="w-full">
                                <thead className="bg-gray-50 border-b border-gray-200">
                                    <tr>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">제품명</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">브랜드</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">가격</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">리뷰</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filtered.slice(0, 50).map((p, idx) => (
                                        <tr key={idx} className="table-row border-b border-gray-100">
                                            <td className="px-6 py-4 font-medium text-gray-900">{p.name_ko || p.name_en}</td>
                                            <td className="px-6 py-4 text-gray-700">{p.brand}</td>
                                            <td className="px-6 py-4 font-bold text-gray-900">
                                                {p.price_krw ? `₩${p.price_krw.toLocaleString()}` : p.price_usd ? `$${p.price_usd}` : '-'}
                                            </td>
                                            <td className="px-6 py-4 text-gray-700">{p.review_count || 0}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>
            );
        };

        // ============= iHERB PRODUCTS PAGE =============
        const IHerbProductsPage = () => {
            const [products, setProducts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedBrand, setSelectedBrand] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('');
            const [sortBy, setSortBy] = useState('rating');
            const [page, setPage] = useState(1);
            const [total, setTotal] = useState(0);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [detailData, setDetailData] = useState(null);
            const [brands, setBrands] = useState([]);
            const [categories, setCategories] = useState([]);
            const [viewMode, setViewMode] = useState('table');
            const limit = viewMode === 'table' ? 50 : 24;

            const loadProducts = useCallback(async () => {
                setLoading(true);
                const params = new URLSearchParams({
                    skip: ((page - 1) * limit).toString(),
                    limit: limit.toString(),
                    sort: sortBy
                });
                if (searchTerm) params.set('search', searchTerm);
                if (selectedBrand) params.set('brand', selectedBrand);
                if (selectedCategory) params.set('category', selectedCategory);

                const res = await apiFetch(`/api/iherb/products?${params}`);
                if (res) {
                    setProducts(res.products || []);
                    setTotal(res.total || 0);
                }
                setLoading(false);
            }, [page, searchTerm, selectedBrand, selectedCategory, sortBy, viewMode]);

            useEffect(() => {
                loadProducts();
            }, [loadProducts]);

            useEffect(() => {
                const loadFilters = async () => {
                    const stats = await apiFetch('/api/iherb/stats');
                    if (stats) {
                        setBrands((stats.by_brand || []).map(b => b.brand).filter(Boolean));
                        setCategories((stats.by_category || []).map(c => c.category).filter(Boolean));
                    }
                };
                loadFilters();
            }, []);

            const totalPages = Math.ceil(total / limit);

            const openDetail = async (product) => {
                setSelectedProduct(product);
                const detail = await apiFetch(`/api/iherb/products/${product.iherb_id}`);
                setDetailData(detail);
            };

            const closeDetail = () => {
                setSelectedProduct(null);
                setDetailData(null);
            };

            return (
                <div className="space-y-6">
                    {/* Filters */}
                    <div className="filter-section">
                        <input type="text" placeholder="상품명 검색..." value={searchTerm}
                            onChange={e => { setSearchTerm(e.target.value); setPage(1); }}
                            className="search-input flex-1" style={{ minWidth: '200px' }}
                        />
                        <select value={selectedBrand} onChange={e => { setSelectedBrand(e.target.value); setPage(1); }} className="filter-select">
                            <option value="">모든 브랜드</option>
                            {brands.slice(0, 50).map(b => <option key={b} value={b}>{b}</option>)}
                        </select>
                        <select value={selectedCategory} onChange={e => { setSelectedCategory(e.target.value); setPage(1); }} className="filter-select">
                            <option value="">모든 카테고리</option>
                            {categories.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                        <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="filter-select">
                            <option value="rating">평점순</option>
                            <option value="reviews">리뷰순</option>
                            <option value="price_asc">가격 낮은순</option>
                            <option value="price_desc">가격 높은순</option>
                            <option value="newest">최신순</option>
                        </select>
                        <div className="view-toggle">
                            <button className={viewMode === 'table' ? 'active' : ''} onClick={() => { setViewMode('table'); setPage(1); }} title="테이블 뷰">☰</button>
                            <button className={viewMode === 'grid' ? 'active' : ''} onClick={() => { setViewMode('grid'); setPage(1); }} title="카드 뷰">▦</button>
                        </div>
                        <span className="text-sm text-gray-500 whitespace-nowrap">{total.toLocaleString()}개 상품</span>
                    </div>

                    {loading ? (
                        <div className="flex justify-center py-20"><div className="spinner"></div></div>
                    ) : products.length === 0 ? (
                        <div className="card p-8 text-center">
                            <p className="text-gray-500 text-lg mb-2">iHerb 상품 데이터가 없습니다</p>
                            <p className="text-gray-400 text-sm">스크래퍼 탭에서 iHerb 스크래핑을 시작하세요</p>
                        </div>
                    ) : (
                        <div>
                            {viewMode === 'table' ? (
                            /* ===== DATA TABLE VIEW ===== */
                            <div className="data-table-wrap" style={{ overflowX: 'auto' }}>
                                <table className="data-table">
                                    <thead>
                                        <tr>
                                            <th style={{width:'30px',textAlign:'center'}}>#</th>
                                            <th className="thumb-cell"></th>
                                            <th className="name-cell" onClick={() => setSortBy('name')}>
                                                상품명 <span className={'sort-icon' + (sortBy==='name'?' sorted':'')}>↕</span>
                                            </th>
                                            <th onClick={() => setSortBy('category')}>
                                                카테고리 <span className={'sort-icon'}>↕</span>
                                            </th>
                                            <th className="num-cell" onClick={() => setSortBy(sortBy==='price_desc'?'price_asc':'price_desc')}>
                                                원화가격 <span className={'sort-icon' + (sortBy.startsWith('price')?' sorted':'')}>↕</span>
                                            </th>
                                            <th className="num-cell" onClick={() => setSortBy('rating')}>
                                                평점 <span className={'sort-icon' + (sortBy==='rating'?' sorted':'')}>↕</span>
                                            </th>
                                            <th className="num-cell" onClick={() => setSortBy('reviews')}>
                                                리뷰수 <span className={'sort-icon' + (sortBy==='reviews'?' sorted':'')}>↕</span>
                                            </th>
                                            <th className="num-cell">Q&A</th>
                                            <th style={{textAlign:'center'}}>재고</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {products.map((p, idx) => (
                                            <tr key={p.iherb_id || idx} onClick={() => openDetail(p)}>
                                                <td style={{textAlign:'center',color:'#94a3b8',fontSize:'0.7rem'}}>{(page - 1) * limit + idx + 1}</td>
                                                <td className="thumb-cell">
                                                    <img
                                                        src={p.image_url || p.thumbnail_url || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40"><rect fill="%23f3f4f6" width="40" height="40"/></svg>'}
                                                        alt="" loading="lazy"
                                                        onError={e => { e.target.style.display = 'none'; }}
                                                    />
                                                </td>
                                                <td className="name-cell">
                                                    <div className="prod-name">{p.name_ko || p.name}</div>
                                                    <div className="prod-brand">{p.brand}</div>
                                                </td>
                                                <td><span className="category-tag">{p.category || '-'}</span></td>
                                                <td className="num-cell price-cell">
                                                    {p.price_krw > 0 ? String.fromCharCode(8361) + Math.round(p.price_krw).toLocaleString() : (p.price_usd > 0 ? ('$' + p.price_usd.toFixed(2)) : '-')}
                                                </td>
                                                <td className="num-cell">
                                                    <div className="rating-bar">
                                                        <span style={{fontWeight:600,color:'#1e293b'}}>{(p.rating || 0).toFixed(1)}</span>
                                                        <div className="bar"><div className="bar-fill" style={{width: ((p.rating || 0) / 5 * 100) + '%'}}></div></div>
                                                    </div>
                                                </td>
                                                <td className="num-cell" style={{fontWeight:500}}>
                                                    {p.review_count ? p.review_count.toLocaleString() : '-'}
                                                </td>
                                                <td className="num-cell" style={{color:'#64748b'}}>
                                                    {p.qa_count || '-'}
                                                </td>
                                                <td style={{textAlign:'center'}}>
                                                    {p.in_stock !== false ?
                                                        <span style={{color:'#059669',fontSize:'0.75rem',fontWeight:600}}>●</span> :
                                                        <span style={{color:'#ef4444',fontSize:'0.75rem',fontWeight:600}}>●</span>
                                                    }
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            ) : (
                            /* ===== CARD GRID VIEW ===== */
                            <div className="product-grid">
                                {products.map((p, idx) => (
                                    <div key={p.iherb_id || idx} className="product-card" onClick={() => openDetail(p)}>
                                        <img
                                            src={p.image_url || p.thumbnail_url || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect fill="%23f3f4f6" width="200" height="200"/><text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="%239ca3af" font-size="14">No Image</text></svg>'}
                                            alt={p.name || 'Product'}
                                            loading="lazy"
                                            onError={e => { e.target.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect fill="%23f3f4f6" width="200" height="200"/><text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="%239ca3af" font-size="14">No Image</text></svg>'; }}
                                        />
                                        <div className="p-4">
                                            <p className="text-xs text-gray-400 mb-1">{p.brand}</p>
                                            <h4 className="font-medium text-gray-900 text-sm mb-2 line-clamp-2" style={{ display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>
                                                {p.name_ko || p.name}
                                            </h4>
                                            <StarRating rating={p.rating || 0} count={p.review_count} />
                                            <div className="mt-2 flex items-center gap-2">
                                                <span className="text-lg font-bold text-green-600">
                                                    {p.price_krw > 0 ? (String.fromCharCode(8361) + Math.round(p.price_krw).toLocaleString()) : ('$' + (p.price_usd ? p.price_usd.toFixed(2) : '0.00'))}
                                                </span>
                                                {p.discount_pct > 0 && (
                                                    <span className="badge badge-danger text-xs">-{p.discount_pct}%</span>
                                                )}
                                            </div>
                                            {p.in_stock === false && (
                                                <span className="badge badge-danger mt-2">품절</span>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            )}

                            {/* Pagination */}
                            {totalPages > 1 && (
                                <div className="pagination mt-6">
                                    <button onClick={() => setPage(1)} disabled={page === 1}>처음</button>
                                    <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page === 1}>이전</button>
                                    <span className="flex items-center px-3 text-sm text-gray-600">
                                        {page} / {totalPages}
                                    </span>
                                    <button onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={page === totalPages}>다음</button>
                                    <button onClick={() => setPage(totalPages)} disabled={page === totalPages}>마지막</button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* Product Detail Modal */}
                    {selectedProduct && (
                        <div className="modal" onClick={closeDetail}>
                            <div className="modal-content" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-start mb-4">
                                    <div className="flex-1">
                                        <p className="text-xs text-gray-400 mb-1">{detailData?.basic?.brand_ko || selectedProduct.brand}</p>
                                        <h2 className="text-xl font-bold text-gray-900">{detailData?.basic?.name_ko || selectedProduct.name_ko || selectedProduct.name}</h2>
                                        {detailData?.basic?.name_ko && detailData?.basic?.name && detailData.basic.name_ko !== detailData.basic.name && (
                                            <p className="text-xs text-gray-400 mt-1">{detailData.basic.name}</p>
                                        )}
                                    </div>
                                    <button onClick={closeDetail} className="text-gray-400 hover:text-gray-600 text-2xl ml-4">✕</button>
                                </div>

                                {!detailData ? (
                                    <div className="flex justify-center py-10"><div className="spinner"></div></div>
                                ) : (
                                    <div className="space-y-6">
                                        {/* Image + Basic Info */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div>
                                                <img
                                                    src={detailData.basic?.image_url || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300"><rect fill="%23f3f4f6" width="300" height="300"/><text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="%239ca3af" font-size="16">No Image</text></svg>'}
                                                    alt={detailData.basic?.name}
                                                    className="w-full rounded-lg"
                                                    style={{ maxHeight: '300px', objectFit: 'contain', background: '#f9fafb' }}
                                                />
                                            </div>
                                            <div className="space-y-3">
                                                {/* Pricing */}
                                                <div>
                                                    <p className="text-sm text-gray-500">가격</p>
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-2xl font-bold text-green-600">${detailData.pricing?.price_usd?.toFixed(2) || '0'}</span>
                                                        {detailData.pricing?.price_krw > 0 && (
                                                            <span className="text-lg font-semibold text-gray-600">₩{detailData.pricing.price_krw.toLocaleString()}</span>
                                                        )}
                                                        {detailData.pricing?.price_original > 0 && detailData.pricing?.price_original > detailData.pricing?.price_usd && (
                                                            <span className="text-gray-400 line-through">${detailData.pricing?.price_original?.toFixed(2)}</span>
                                                        )}
                                                        {detailData.pricing?.discount_pct > 0 && (
                                                            <span className="badge badge-danger">-{detailData.pricing?.discount_pct}%</span>
                                                        )}
                                                    </div>
                                                </div>
                                                {/* Rating */}
                                                <div>
                                                    <p className="text-sm text-gray-500">평점</p>
                                                    <StarRating rating={detailData.rating?.rating || 0} count={detailData.rating?.count} />
                                                </div>
                                                {/* Stock */}
                                                <div>
                                                    <p className="text-sm text-gray-500">재고</p>
                                                    <span className={`badge ${detailData.pricing?.in_stock !== false ? 'badge-success' : 'badge-danger'}`}>
                                                        {detailData.pricing?.stock_status || (detailData.pricing?.in_stock !== false ? 'In Stock' : 'Out of Stock')}
                                                    </span>
                                                </div>
                                                {/* Badges */}
                                                {detailData.certifications?.badges?.length > 0 && (
                                                    <div>
                                                        <p className="text-sm text-gray-500 mb-1">배지</p>
                                                        <div className="flex flex-wrap gap-1">
                                                            {detailData.certifications.badges.map((b, i) => (
                                                                <span key={i} className="tag">{b}</span>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                                {/* Link */}
                                                {detailData.basic?.url && (
                                                    <a href={detailData.basic.url} target="_blank" rel="noopener noreferrer"
                                                        className="inline-block mt-2 text-sm text-blue-600 hover:underline">
                                                        iHerb에서 보기 →
                                                    </a>
                                                )}
                                            </div>
                                        </div>

                                        {/* Description (Korean preferred) */}
                                        {(detailData.description?.description_ko || detailData.description?.description) && (
                                            <div>
                                                <h4 className="font-bold text-gray-900 mb-2">상품 설명 {detailData.description?.description_ko && <span className="text-xs font-normal text-blue-500 ml-1">🇰🇷</span>}</h4>
                                                <p className="text-sm text-gray-700 whitespace-pre-line">{(detailData.description.description_ko || detailData.description.description).slice(0, 500)}</p>
                                                {detailData.description?.description_ko && detailData.description?.description && (
                                                    <details className="mt-2">
                                                        <summary className="text-xs text-gray-400 cursor-pointer">영문 원본 보기</summary>
                                                        <p className="text-xs text-gray-500 mt-1 whitespace-pre-line">{detailData.description.description.slice(0, 300)}</p>
                                                    </details>
                                                )}
                                            </div>
                                        )}

                                        {/* Suggested Use (Korean preferred) */}
                                        {(detailData.description?.suggested_use_ko || detailData.description?.suggested_use) && (
                                            <div>
                                                <h4 className="font-bold text-gray-900 mb-2">복용법 {detailData.description?.suggested_use_ko && <span className="text-xs font-normal text-blue-500 ml-1">🇰🇷</span>}</h4>
                                                <p className="text-sm text-gray-700">{detailData.description.suggested_use_ko || detailData.description.suggested_use}</p>
                                            </div>
                                        )}

                                        {/* Warnings (Korean preferred) */}
                                        {(detailData.description?.warnings_ko || detailData.description?.warnings) && (
                                            <div>
                                                <h4 className="font-bold text-red-600 mb-2">⚠ 주의사항 {detailData.description?.warnings_ko && <span className="text-xs font-normal text-blue-500 ml-1">🇰🇷</span>}</h4>
                                                <p className="text-sm text-gray-700 bg-red-50 rounded-lg p-3 border border-red-100">{detailData.description.warnings_ko || detailData.description.warnings}</p>
                                            </div>
                                        )}

                                        {/* Supplement Facts - text format */}
                                        {detailData.nutrition?.supplement_facts && typeof detailData.nutrition.supplement_facts === 'string' && detailData.nutrition.supplement_facts.length > 0 && (
                                            <div>
                                                <h4 className="font-bold text-gray-900 mb-2">영양 성분 정보</h4>
                                                <div className="bg-gray-50 rounded-lg p-4 border border-gray-200">
                                                    <div className="grid grid-cols-2 gap-2 text-sm mb-3">
                                                        {detailData.nutrition?.serving_size && (
                                                            <div><span className="text-gray-500 font-medium">1회 제공량:</span> <span className="text-gray-800">{detailData.nutrition.serving_size}</span></div>
                                                        )}
                                                        {detailData.nutrition?.servings_per_container && (
                                                            <div><span className="text-gray-500 font-medium">용기당 제공 횟수:</span> <span className="text-gray-800">{detailData.nutrition.servings_per_container}</span></div>
                                                        )}
                                                    </div>
                                                    <div className="text-xs text-gray-700 whitespace-pre-line border-t border-gray-200 pt-2" style={{maxHeight:'200px', overflowY:'auto'}}>{detailData.nutrition.supplement_facts}</div>
                                                </div>
                                            </div>
                                        )}

                                        {/* Supplement Facts - array format (legacy) */}
                                        {detailData.nutrition?.supplement_facts && Array.isArray(detailData.nutrition.supplement_facts) && detailData.nutrition.supplement_facts.length > 0 && (
                                            <div>
                                                <h4 className="font-bold text-gray-900 mb-2">영양 성분 정보</h4>
                                                <div className="bg-gray-50 rounded-lg p-3 border border-gray-200">
                                                    <table className="w-full text-sm">
                                                        <thead>
                                                            <tr className="border-b border-gray-300">
                                                                <th className="text-left py-1 text-gray-600">성분</th>
                                                                <th className="text-right py-1 text-gray-600">함량</th>
                                                                <th className="text-right py-1 text-gray-600">일일섭취량%</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {detailData.nutrition.supplement_facts.map((sf, i) => (
                                                                <tr key={i} className="border-b border-gray-100">
                                                                    <td className="py-1 text-gray-800">{sf.name}</td>
                                                                    <td className="text-right py-1 text-gray-700">{sf.amount}</td>
                                                                    <td className="text-right py-1 text-gray-500">{sf.daily_value || '-'}</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        )}

                                        {/* Ingredients / Other Ingredients (Korean preferred) */}
                                        {(detailData.nutrition?.ingredients || detailData.nutrition?.ingredients_ko || detailData.nutrition?.other_ingredients) && (
                                            <div>
                                                <h4 className="font-bold text-gray-900 mb-2">성분 정보 {detailData.nutrition?.ingredients_ko && <span className="text-xs font-normal text-blue-500 ml-1">🇰🇷</span>}</h4>
                                                <div className="bg-gray-50 rounded-lg p-3 border border-gray-200 space-y-2">
                                                    {(detailData.nutrition.ingredients_ko || detailData.nutrition.ingredients) && (
                                                        <div>
                                                            <p className="text-xs font-medium text-gray-500 mb-1">주요 성분</p>
                                                            <p className="text-xs text-gray-700">{detailData.nutrition.ingredients_ko || detailData.nutrition.ingredients}</p>
                                                        </div>
                                                    )}
                                                    {(detailData.nutrition.other_ingredients_ko || detailData.nutrition.other_ingredients) && (
                                                        <div>
                                                            <p className="text-xs font-medium text-gray-500 mb-1">기타 성분</p>
                                                            <p className="text-xs text-gray-700">{detailData.nutrition.other_ingredients_ko || detailData.nutrition.other_ingredients}</p>
                                                        </div>
                                                    )}
                                                    {(detailData.nutrition?.allergen_info_ko || detailData.nutrition?.allergen_info) && (
                                                        <div>
                                                            <p className="text-xs font-medium text-red-500 mb-1">알레르기 정보</p>
                                                            <p className="text-xs text-red-600">{detailData.nutrition.allergen_info_ko || detailData.nutrition.allergen_info}</p>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )}

                                        {/* Product Specs */}
                                        {detailData.specs && (
                                            <div>
                                                <h4 className="font-bold text-gray-900 mb-2">제품 규격</h4>
                                                <div className="bg-gray-50 rounded-lg p-4 border border-gray-200">
                                                    <div className="grid grid-cols-2 gap-3 text-sm">
                                                        {detailData.nutrition?.serving_size && <div><span className="text-gray-500">1회 섭취량:</span> <span className="font-medium">{detailData.nutrition.serving_size}</span></div>}
                                                        {detailData.nutrition?.servings_per_container && <div><span className="text-gray-500">용기당 제공횟수:</span> <span className="font-medium">{detailData.nutrition.servings_per_container}</span></div>}
                                                        {detailData.specs.count && <div><span className="text-gray-500">수량:</span> <span className="font-medium">{detailData.specs.count}</span></div>}
                                                        {detailData.specs.product_form && <div><span className="text-gray-500">제형:</span> <span className="font-medium">{detailData.specs.product_form}</span></div>}
                                                        {detailData.specs.weight && <div><span className="text-gray-500">제품 무게:</span> <span className="font-medium">{detailData.specs.weight}</span></div>}
                                                        {detailData.specs.shipping_weight && <div><span className="text-gray-500">배송 무게:</span> <span className="font-medium">{detailData.specs.shipping_weight}</span></div>}
                                                        {detailData.specs.dimensions && <div><span className="text-gray-500">제품 규격:</span> <span className="font-medium">{detailData.specs.dimensions}</span></div>}
                                                        {detailData.specs.upc_barcode && <div><span className="text-gray-500">UPC 바코드:</span> <span className="font-mono font-medium">{detailData.specs.upc_barcode}</span></div>}
                                                        {detailData.specs.sku && <div><span className="text-gray-500">SKU:</span> <span className="font-mono font-medium">{detailData.specs.sku}</span></div>}
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {/* Category & Meta (Korean preferred) */}
                                        {(detailData.category?.category || detailData.category?.category_ko) && (
                                            <div>
                                                <h4 className="font-bold text-gray-900 mb-2">카테고리</h4>
                                                {detailData.category?.path_ko && (
                                                    <p className="text-xs text-gray-500 mb-2">{detailData.category.path_ko}</p>
                                                )}
                                                <div className="flex flex-wrap gap-2 text-sm">
                                                    {(detailData.category?.category_ko || detailData.category?.category) && <span className="tag">{detailData.category.category_ko || detailData.category.category}</span>}
                                                    {(detailData.category?.sub_category_ko || detailData.category?.sub_category) && <span className="tag">{detailData.category.sub_category_ko || detailData.category.sub_category}</span>}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============= MAPPING PAGE =============
        const MappingPage = () => {
            const [mappings, setMappings] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const load = async () => {
                    const res = await apiFetch('/api/mapping');
                    if (res) setMappings(Array.isArray(res) ? res : []);
                    setLoading(false);
                };
                load();
            }, []);

            if (loading) return <div className="flex justify-center py-20"><div className="spinner"></div></div>;

            return (
                <div className="space-y-6">
                    {mappings.length === 0 ? (
                        <div className="card p-8 text-center">
                            <p className="text-gray-500">매핑 데이터가 없습니다</p>
                        </div>
                    ) : (
                        <div className="card overflow-hidden">
                            <table className="w-full">
                                <thead className="bg-gray-50 border-b border-gray-200">
                                    <tr>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">OPLE 제품</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">iHerb 제품</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">매칭방법</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">점수</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">가격차</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {mappings.slice(0, 50).map((m, idx) => (
                                        <tr key={idx} className="table-row border-b border-gray-100">
                                            <td className="px-6 py-4 font-medium text-gray-900">{m.ople_id}</td>
                                            <td className="px-6 py-4 text-gray-700">{m.iherb_name || m.iherb_id}</td>
                                            <td className="px-6 py-4"><span className="badge badge-info">{m.match_method}</span></td>
                                            <td className="px-6 py-4 font-bold">{m.match_score ? `${(m.match_score * 100).toFixed(0)}%` : '-'}</td>
                                            <td className="px-6 py-4">
                                                <span className={m.price_diff >= 0 ? 'text-red-600 font-bold' : 'text-green-600 font-bold'}>
                                                    {m.price_diff ? `$${Math.abs(m.price_diff).toFixed(2)}` : '-'}
                                                </span>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>
            );
        };

        // ============= ANALYTICS =============
        const AnalyticsPage = () => {
            const [stats, setStats] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const load = async () => {
                    const res = await apiFetch('/api/iherb/stats');
                    setStats(res);
                    setLoading(false);
                };
                load();
            }, []);

            if (loading) return <div className="flex justify-center py-20"><div className="spinner"></div></div>;
            if (!stats || !stats.total) return <div className="card p-8 text-center"><p className="text-gray-500">분석할 데이터가 없습니다. 먼저 iHerb 스크래핑을 실행하세요.</p></div>;

            const topRated = stats.top_rated || [];

            return (
                <div className="space-y-6">
                    <div className="card p-6">
                        <h3 className="text-lg font-bold text-gray-900 mb-4">최고 평점 상품 (iHerb)</h3>
                        <div className="space-y-3">
                            {topRated.map((p, idx) => (
                                <div key={idx} className="flex items-center gap-4 pb-3 border-b border-gray-100 last:border-0">
                                    <span className="text-2xl font-bold text-gray-300 w-8">#{idx + 1}</span>
                                    <div className="flex-1">
                                        <p className="font-medium text-gray-900">{p.name}</p>
                                        <p className="text-sm text-gray-500">{p.brand}</p>
                                    </div>
                                    <div className="text-right">
                                        <StarRating rating={p.rating} count={p.review_count} />
                                        <p className="text-sm font-bold text-green-600">${p.price_usd?.toFixed(2)}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="card p-6">
                            <h3 className="text-lg font-bold text-gray-900 mb-4">브랜드별 상품 수</h3>
                            <div className="space-y-2">
                                {(stats.by_brand || []).slice(0, 10).map((b, idx) => (
                                    <div key={idx} className="flex justify-between items-center">
                                        <span className="text-sm text-gray-700">{b.brand || 'Unknown'}</span>
                                        <span className="font-bold text-gray-900">{b.count}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="card p-6">
                            <h3 className="text-lg font-bold text-gray-900 mb-4">카테고리별 상품 수</h3>
                            <div className="space-y-2">
                                {(stats.by_category || []).slice(0, 10).map((c, idx) => (
                                    <div key={idx} className="flex justify-between items-center">
                                        <span className="text-sm text-gray-700">{c.category || 'Unknown'}</span>
                                        <span className="font-bold text-gray-900">{c.count}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ============= SCRAPER PAGE =============
        const ScraperPage = () => {
            const [isScraping, setIsScraping] = useState(false);
            const [scrapeStatus, setScrapeStatus] = useState('');
            const [jobs, setJobs] = useState([]);
            const [loadingJobs, setLoadingJobs] = useState(true);
            const [selectedCategories, setSelectedCategories] = useState('all');
            const [maxProducts, setMaxProducts] = useState(50);

            useEffect(() => {
                const loadJobs = async () => {
                    const res = await apiFetch('/api/jobs');
                    if (res) setJobs(Array.isArray(res) ? res : []);
                    setLoadingJobs(false);
                };
                loadJobs();
            }, []);

            const handleStartIHerbScrape = async () => {
                setIsScraping(true);
                setScrapeStatus('스크래핑 작업을 시작하는 중...');

                const body = {
                    max_products: maxProducts
                };
                if (selectedCategories !== 'all') {
                    body.categories = [selectedCategories];
                }

                try {
                    const res = await fetch('/api/jobs/scrape-iherb', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    const data = await res.json();
                    if (data.job_id) {
                        setScrapeStatus(`작업 시작됨 (ID: ${data.job_id}). 백그라운드에서 실행 중...`);
                        // Poll job status
                        const pollInterval = setInterval(async () => {
                            const jobRes = await apiFetch(`/api/jobs/${data.job_id}`);
                            if (jobRes) {
                                setScrapeStatus(`상태: ${jobRes.status} | 처리: ${jobRes.processed_items || 0}/${jobRes.total_items || '?'}`);
                                if (jobRes.status === 'completed' || jobRes.status === 'failed') {
                                    clearInterval(pollInterval);
                                    setIsScraping(false);
                                    if (jobRes.status === 'completed') {
                                        setScrapeStatus(`완료! ${jobRes.processed_items}개 상품 수집됨`);
                                    } else {
                                        setScrapeStatus(`실패: ${jobRes.error_message || '알 수 없는 오류'}`);
                                    }
                                }
                            }
                        }, 5000);
                    }
                } catch (err) {
                    setScrapeStatus('스크래핑 시작 실패: ' + err.message);
                    setIsScraping(false);
                }
            };

            const categories = [
                { value: 'all', label: '전체 카테고리' },
                { value: 'vitamins', label: '비타민' },
                { value: 'minerals', label: '미네랄' },
                { value: 'omega_fish_oil', label: '오메가/피쉬오일' },
                { value: 'probiotics', label: '프로바이오틱스' },
                { value: 'protein', label: '프로틴' },
                { value: 'amino_acids', label: '아미노산' },
                { value: 'herbs', label: '허브' },
                { value: 'antioxidants', label: '항산화제' },
                { value: 'joint_bone', label: '관절/뼈' },
                { value: 'digestive', label: '소화건강' },
                { value: 'immune', label: '면역력' },
                { value: 'sleep', label: '수면' },
                { value: 'energy', label: '에너지' },
                { value: 'weight_management', label: '체중관리' },
                { value: 'beauty', label: '뷰티' },
                { value: 'mens_health', label: '남성건강' },
                { value: 'womens_health', label: '여성건강' },
                { value: 'children', label: '어린이' },
                { value: 'greens_superfoods', label: '그린스/슈퍼푸드' },
                { value: 'sports_nutrition', label: '스포츠영양' }
            ];

            return (
                <div className="space-y-6">
                    {/* iHerb Scraper Control */}
                    <div className="card p-6 bg-gradient-to-r from-green-50 to-blue-50">
                        <h3 className="text-lg font-bold text-gray-900 mb-4">iHerb 스크래핑</h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                            <div>
                                <label className="text-sm font-medium text-gray-600 block mb-1">카테고리</label>
                                <select value={selectedCategories} onChange={e => setSelectedCategories(e.target.value)} className="filter-select w-full">
                                    {categories.map(c => <option key={c.value} value={c.value}>{c.label}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="text-sm font-medium text-gray-600 block mb-1">최대 상품 수</label>
                                <select value={maxProducts} onChange={e => setMaxProducts(Number(e.target.value))} className="filter-select w-full">
                                    <option value={10}>10개 (테스트)</option>
                                    <option value={50}>50개</option>
                                    <option value={100}>100개</option>
                                    <option value={500}>500개</option>
                                    <option value={1000}>1,000개</option>
                                    <option value={5000}>5,000개</option>
                                    <option value={0}>전체 (제한 없음)</option>
                                </select>
                            </div>
                            <div className="flex items-end">
                                <button onClick={handleStartIHerbScrape} disabled={isScraping} className="btn-primary w-full">
                                    {isScraping ? (
                                        <span className="flex items-center justify-center gap-2">
                                            <span className="loading"></span>
                                            수집 중...
                                        </span>
                                    ) : 'iHerb 스크래핑 시작'}
                                </button>
                            </div>
                        </div>
                        {scrapeStatus && (
                            <div className="bg-white rounded-lg p-3 border border-gray-200">
                                <p className="text-sm text-gray-700">{scrapeStatus}</p>
                            </div>
                        )}
                    </div>

                    {/* Job History */}
                    <div className="card overflow-hidden">
                        <div className="p-6 border-b border-gray-200">
                            <h3 className="text-lg font-bold text-gray-900">작업 이력</h3>
                        </div>
                        {loadingJobs ? (
                            <div className="flex justify-center py-10"><div className="spinner"></div></div>
                        ) : jobs.length === 0 ? (
                            <div className="p-6 text-center text-gray-500">아직 작업 이력이 없습니다</div>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead className="bg-gray-50 border-b border-gray-200">
                                        <tr>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">ID</th>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">유형</th>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">상태</th>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">진행</th>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">시작</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {jobs.map((job) => (
                                            <tr key={job.id} className="table-row border-b border-gray-100">
                                                <td className="px-6 py-4 font-medium text-gray-900">{job.id}</td>
                                                <td className="px-6 py-4 text-gray-700">{job.job_type}</td>
                                                <td className="px-6 py-4">
                                                    <span className={`badge ${
                                                        job.status === 'completed' ? 'badge-success' :
                                                        job.status === 'running' ? 'badge-warning' :
                                                        job.status === 'failed' ? 'badge-danger' :
                                                        'badge-info'
                                                    }`}>
                                                        {job.status === 'running' && <span className="inline-block loading mr-1" style={{ width: '12px', height: '12px' }}></span>}
                                                        {job.status}
                                                    </span>
                                                </td>
                                                <td className="px-6 py-4 text-gray-700">{job.processed_items || 0} / {job.total_items || '?'}</td>
                                                <td className="px-6 py-4 text-gray-500 text-sm">{job.started_at || job.created_at || '-'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ============= MAIN APP =============
        const Main = () => {
            const [activeTab, setActiveTab] = useState('dashboard');

            return (
                <div style={{display:'flex',minHeight:'100vh',background:'#f0f2f5'}}>
                    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} />
                    <main style={{marginLeft:'240px',flex:1,padding:'28px 32px',maxWidth:'calc(100vw - 240px)'}}>
                        {activeTab !== 'dashboard' && (
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'24px'}}>
                            <h1 style={{fontSize:'1.5rem',fontWeight:800,color:'#1e293b'}}>
                                {activeTab === 'products' && 'OPLE 제품'}
                                {activeTab === 'iherb' && 'iHerb 상품'}
                                {activeTab === 'mapping' && 'iHerb 매핑'}
                                {activeTab === 'analytics' && '분석'}
                                {activeTab === 'scraper' && '스크래퍼'}
                            </h1>
                        </div>
                        )}
                        {activeTab === 'dashboard' && <Dashboard />}
                        {activeTab === 'products' && <ProductsPage />}
                        {activeTab === 'iherb' && <IHerbProductsPage />}
                        {activeTab === 'mapping' && <MappingPage />}
                        {activeTab === 'analytics' && <AnalyticsPage />}
                        {activeTab === 'scraper' && <ScraperPage />}
                    </main>
                </div>
            );
        };

        const App = () => {
            return (
                <AppProvider>
                    <Main />
                </AppProvider>
            );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
