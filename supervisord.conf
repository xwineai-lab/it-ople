[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:fastapi]
command=uvicorn main:app --host 0.0.0.0 --port 8000
directory=/app/api
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:shopify]
command=bash -c "cd /app/shopify-app && npx prisma db push --skip-generate --accept-data-loss 2>/dev/null; npm run start"
directory=/app/shopify-app
environment=PORT=3000,NODE_ENV=production,DATABASE_URL="file:/app/shopify-app/prisma/dev.sqlite"
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
